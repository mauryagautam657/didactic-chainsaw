<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="scoreboard">
            <div class="score">
                <div class="player-label">Player</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score">
                <div class="player-label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="instructions">
            <p>Use <strong>Mouse</strong> or <strong>Arrow Keys (↑↓)</strong> to control the left paddle</p>
            <p>Computer controls the right paddle</p>
            <p>Press <strong>SPACE</strong> to start/pause the game</p>
        </div>
    </div>
    
    <script src="pong.js"></script>
</body>
</html>
